<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Video Studio</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<!-- ═══ Header ═══ -->
<header class="header">
  <div class="logo">
    <span class="logo-icon">🎬</span>
    <span class="logo-text">AI Video Studio</span>
    <span class="logo-badge">BETA</span>
  </div>
  <div class="header-right">
    <div class="status-pill" id="statusPill">
      <span class="status-dot"></span>
      <span>就绪</span>
    </div>
  </div>
</header>

<!-- ═══ Main ═══ -->
<main class="main">
  <!-- Step 1: Upload -->
  <section class="upload-zone" id="uploadZone">
    <div class="upload-inner">
      <div class="upload-icon">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </div>
      <h2>拖拽视频到这里</h2>
      <p>或 <label class="upload-btn">选择文件<input type="file" id="fileInput" accept="video/*,.gif" hidden></label></p>
      <p class="upload-hint">支持 MP4 / AVI / MOV / MKV / WebM / GIF · 最大 500MB</p>
    </div>
    <div class="upload-loading" id="uploadLoading" style="display:none">
      <div class="spinner"></div>
      <p>上传中...</p>
    </div>
  </section>

  <!-- Step 2: Preview + Tools -->
  <section class="workspace" id="workspace" style="display:none">
    <!-- Video Preview -->
    <div class="preview-panel">
      <div class="video-wrap">
        <video id="previewVideo" controls></video>
      </div>
      <div class="video-meta" id="videoMeta"></div>
      <button class="btn-new" id="btnNew">📂 上传新视频</button>
    </div>

    <!-- Tools Panel -->
    <div class="tools-panel">
      <!-- Tab switcher -->
      <div class="tab-bar">
        <button class="tab active" data-tab="effects">✨ AI 特效</button>
        <button class="tab" data-tab="extend">📐 视频扩展</button>
      </div>

      <!-- Effects Tab -->
      <div class="tab-content active" id="tab-effects">
        <div class="intensity-control">
          <label>特效强度</label>
          <div class="slider-wrap">
            <input type="range" id="intensity" min="0.1" max="1.0" step="0.05" value="0.5">
            <span id="intensityVal">50%</span>
          </div>
        </div>
        <div class="effects-grid" id="effectsGrid"></div>
      </div>

      <!-- Extend Tab -->
      <div class="tab-content" id="tab-extend">
        <div class="extend-param" id="extendParam" style="display:none">
          <label id="paramLabel">参数</label>
          <div class="slider-wrap">
            <input type="range" id="extendSlider" min="1" max="10" step="1" value="2">
            <span id="extendVal">2x</span>
          </div>
        </div>
        <div class="effects-grid" id="extendGrid"></div>
      </div>
    </div>
  </section>

  <!-- Step 3: Processing -->
  <section class="processing-panel" id="processingPanel" style="display:none">
    <div class="processing-inner">
      <div class="processing-anim">
        <div class="ring"></div>
        <span class="processing-icon" id="processingIcon">✨</span>
      </div>
      <h3 id="processingTitle">处理中...</h3>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <p class="progress-text" id="progressText">0%</p>
      <p class="progress-detail" id="progressDetail"></p>
    </div>
  </section>

  <!-- Step 4: Result -->
  <section class="result-panel" id="resultPanel" style="display:none">
    <div class="result-inner">
      <h2>🎉 处理完成！</h2>
      <div class="video-wrap">
        <video id="resultVideo" controls></video>
      </div>
      <div class="result-actions">
        <a class="btn-download" id="btnDownload" href="#">⬇️ 下载视频</a>
        <button class="btn-secondary" id="btnBackToEdit">🔄 继续编辑</button>
        <button class="btn-secondary" id="btnNewVideo">📂 新视频</button>
      </div>
    </div>
  </section>
</main>

<!-- Toast -->
<div class="toast-container" id="toastContainer"></div>

<script src="/static/js/app.js"></script>
</body>
</html>
