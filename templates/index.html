<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AVP Studio - 企業級 AI 視頻生產平台</title>
<link rel="stylesheet" href="/static/css/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<!-- ═══ Header ═══ -->
<header class="header">
  <div class="logo">
    <span class="logo-icon">🎬</span>
    <span class="logo-text">AVP Studio</span>
    <span class="logo-badge">PRO</span>
  </div>
  <nav class="header-nav">
    <button class="nav-tab active" data-section="dashboard">
      <span class="nav-icon">📊</span> 儀表板
    </button>
    <button class="nav-tab" data-section="projects">
      <span class="nav-icon">📁</span> 項目
    </button>
    <button class="nav-tab" data-section="scenes">
      <span class="nav-icon">🎬</span> 場景
    </button>
    <button class="nav-tab" data-section="generate">
      <span class="nav-icon">✨</span> 生成
    </button>
  </nav>
  <div class="header-right">
    <div class="health-status" id="healthStatus">
      <span class="status-dot"></span>
      <span class="status-text">就緒</span>
    </div>
    <button class="btn-icon" id="userMenu" title="用戶菜單">👤</button>
  </div>
</header>

<!-- ═══ Main Content ═══ -->
<main class="main-content">

  <!-- ═══ Dashboard ═══ -->
  <section class="section active" id="section-dashboard">
    <div class="section-header">
      <h1>儀表板</h1>
      <p>系統狀態與統計</p>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">📁</div>
        <div class="stat-info">
          <div class="stat-value" id="statProjects">0</div>
          <div class="stat-label">項目總數</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🎬</div>
        <div class="stat-info">
          <div class="stat-value" id="statScenes">0</div>
          <div class="stat-label">場景總數</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">⚡</div>
        <div class="stat-info">
          <div class="stat-value" id="statGenerating">0</div>
          <div class="stat-label">生成中</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">✅</div>
        <div class="stat-info">
          <div class="stat-value" id="statCompleted">0</div>
          <div class="stat-label">已完成</div>
        </div>
      </div>
    </div>

    <div class="dashboard-grid">
      <div class="card">
        <div class="card-header">
          <h3>🎯 最近項目</h3>
          <button class="btn-text" onclick="app.navigate('projects')">查看全部</button>
        </div>
        <div class="card-content" id="recentProjects">
          <div class="empty-state">
            <p>暫無項目</p>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h3>⚡ 生成隊列</h3>
          <button class="btn-text" onclick="app.refreshQueue()">刷新</button>
        </div>
        <div class="card-content" id="generationQueue">
          <div class="empty-state">
            <p>隊列為空</p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ═══ Projects ═══ -->
  <section class="section" id="section-projects">
    <div class="section-header">
      <h1>項目管理</h1>
      <button class="btn-primary" onclick="projects.showCreateModal()">
        <span>+</span> 新建項目
      </button>
    </div>

    <div class="projects-grid" id="projectsList">
      <div class="empty-state large">
        <div class="empty-icon">📁</div>
        <h3>暫無項目</h3>
        <p>點擊右上角創建第一個項目</p>
      </div>
    </div>
  </section>

  <!-- ═══ Scenes ═══ -->
  <section class="section" id="section-scenes">
    <div class="section-header">
      <h1>場景管理</h1>
      <div class="header-actions">
        <select class="select" id="projectFilter">
          <option value="">所有項目</option>
        </select>
        <button class="btn-primary" onclick="scenes.showCreateModal()">
          <span>+</span> 新建場景
        </button>
      </div>
    </div>

    <div class="scenes-list" id="scenesList">
      <div class="empty-state large">
        <div class="empty-icon">🎬</div>
        <h3>暫無場景</h3>
        <p>選擇項目後創建場景</p>
      </div>
    </div>
  </section>

  <!-- ═══ Generate ═══ -->
  <section class="section" id="section-generate">
    <div class="section-header">
      <h1>視頻生成</h1>
    </div>

    <div class="generate-container">
      <div class="card">
        <div class="card-header">
          <h3>📝 提示詞優化</h3>
        </div>
        <div class="card-content">
          <div class="form-group">
            <label>原始提示詞</label>
            <textarea id="promptInput" rows="4" placeholder="輸入簡單的描述，例如：一個人在海邊散步..."></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>風格</label>
              <select id="promptStyle">
                <option value="cinematic">電影級</option>
                <option value="anime">動畫</option>
                <option value="realistic">寫實</option>
                <option value="3d">3D 渲染</option>
              </select>
            </div>
          </div>
          <button class="btn-primary" onclick="prompts.optimize()">
            ✨ 優化提示詞
          </button>

          <div id="promptResult" class="result-box" style="display:none">
            <div class="result-header">
              <h4>優化結果</h4>
              <span class="quality-badge" id="qualityScore">質量：0.85</span>
            </div>
            <div class="result-content">
              <label>優化後提示詞</label>
              <textarea id="optimizedPrompt" rows="3" readonly></textarea>
              <label>負向提示詞</label>
              <textarea id="negativePrompt" rows="2" readonly></textarea>
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h3>🎬 生成任務</h3>
          <button class="btn-text" onclick="generation.refreshQueue()">刷新</button>
        </div>
        <div class="card-content" id="generateTasks">
          <div class="empty-state">
            <p>暫無生成任務</p>
          </div>
        </div>
      </div>
    </div>
  </section>

</main>

<!-- ═══ Modals ═══ -->

<!-- Create Project Modal -->
<div class="modal" id="createProjectModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>新建項目</h3>
      <button class="modal-close" onclick="projects.closeCreateModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>項目名稱</label>
        <input type="text" id="projectName" placeholder="輸入項目名稱">
      </div>
      <div class="form-group">
        <label>描述</label>
        <textarea id="projectDescription" rows="3" placeholder="項目描述..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="projects.closeCreateModal()">取消</button>
      <button class="btn-primary" onclick="projects.create()">創建</button>
    </div>
  </div>
</div>

<!-- Create Scene Modal -->
<div class="modal" id="createSceneModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>新建場景</h3>
      <button class="modal-close" onclick="scenes.closeCreateModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>場景標題</label>
        <input type="text" id="sceneTitle" placeholder="場景標題">
      </div>
      <div class="form-group">
        <label>描述</label>
        <textarea id="sceneDescription" rows="2" placeholder="場景描述..."></textarea>
      </div>
      <div class="form-group">
        <label>敘事文本</label>
        <textarea id="sceneNarrative" rows="4" placeholder="詳細的敘事描述..."></textarea>
      </div>
      <div class="form-group">
        <label>正向提示詞</label>
        <textarea id="scenePositivePrompt" rows="2" placeholder="cinematic shot, masterpiece..."></textarea>
      </div>
      <div class="form-group">
        <label>負向提示詞</label>
        <textarea id="sceneNegativePrompt" rows="2" placeholder="ugly, deformed, low quality..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="scenes.closeCreateModal()">取消</button>
      <button class="btn-primary" onclick="scenes.create()">創建</button>
    </div>
  </div>
</div>

<!-- Scene Detail Modal -->
<div class="modal" id="sceneDetailModal">
  <div class="modal-content modal-large">
    <div class="modal-header">
      <h3 id="sceneDetailTitle">場景詳情</h3>
      <button class="modal-close" onclick="scenes.closeDetailModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="scene-detail">
        <div class="detail-row">
          <span class="detail-label">狀態:</span>
          <span class="status-badge" id="sceneDetailStatus">draft</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">版本:</span>
          <span id="sceneDetailVersion">1.0.0</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">時長:</span>
          <span id="sceneDetailDuration">5.0s</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">解析度:</span>
          <span id="sceneDetailResolution">1920x1080</span>
        </div>
        <div class="detail-section">
          <h4>描述</h4>
          <p id="sceneDetailDescription"></p>
        </div>
        <div class="detail-section">
          <h4>敘事文本</h4>
          <p id="sceneDetailNarrative"></p>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="scenes.closeDetailModal()">關閉</button>
      <button class="btn-warning" onclick="scenes.transitionToReview()">提交審核</button>
      <button class="btn-primary" onclick="scenes.submitGeneration()">生成視頻</button>
    </div>
  </div>
</div>

<!-- Toast Notifications -->
<div class="toast-container" id="toastContainer"></div>

<!-- Loading Overlay -->
<div class="loading-overlay" id="loadingOverlay" style="display:none">
  <div class="loading-spinner"></div>
  <p id="loadingText">加載中...</p>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
